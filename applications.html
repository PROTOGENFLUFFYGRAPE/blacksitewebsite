<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0a0a0a 0%,#1a0a2e 50%,#0f0f1e 100%);
min-height:100vh;
font-family:'Poppins',sans-serif;
padding:20px;
}

.form-container{
background:rgba(26,10,46,0.8);
border:1px solid rgba(167,51,255,0.3);
border-radius:15px;
padding:40px;
max-width:600px;
margin:50px auto;
backdrop-filter:blur(10px);
}

.form-title{
font-size:2rem;
font-weight:800;
background:linear-gradient(135deg,#a733ff 0%,#ff5af0 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
margin-bottom:10px;
}

.form-description{
color:rgba(255,255,255,0.6);
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:25px;
}

label{
display:block;
color:rgba(255,255,255,0.9);
margin-bottom:8px;
font-size:.95rem;
}

.required::after{
content:" *";
color:#ff5af0;
}

input[type="text"],
input[type="number"],
textarea,
select{
width:100%;
padding:12px 15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(167,51,255,0.3);
border-radius:8px;
color:white;
font-family:'Poppins',sans-serif;
font-size:.95rem;
}

/* Dropdown box color */
select{
background:#2c0a45;
color:white;
border:1px solid #8f3cff;
cursor:pointer;
}

/* Dropdown menu options */
select option{
background:#2c0a45;
color:white;
}

input:focus,
textarea:focus,
select:focus{
outline:none;
background:rgba(255,255,255,0.08);
border-color:#a733ff;
box-shadow:0 0 15px rgba(167,51,255,0.2);
}

textarea{
resize:vertical;
min-height:100px;
}

.submit-button{
width:100%;
padding:15px;
background:linear-gradient(135deg,#a733ff 0%,#ff5af0 100%);
color:white;
border:none;
border-radius:8px;
font-weight:600;
font-size:1rem;
cursor:pointer;
margin-top:20px;
}

.submit-button:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(167,51,255,0.4);
}

.back-button{
display:block;
text-align:center;
background:rgba(167,51,255,0.3);
color:white;
border:1px solid rgba(167,51,255,0.5);
padding:10px;
border-radius:8px;
margin-top:15px;
text-decoration:none;
}

.success-message{
display:none;
position:fixed;
top:20px;
right:20px;
background:#a733ff;
color:white;
padding:15px 25px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="form-container">

<h1 class="form-title" id="formTitle"></h1>
<p class="form-description" id="formDescription"></p>

<form id="applicationForm"></form>

<a href="index.html" class="back-button">Back to Welcome</a>

</div>

<div class="success-message" id="successMessage">
Application submitted successfully!
</div>

<script>

async function loadApplicationForm(){

const response=await fetch('application.json');
const data=await response.json();

document.getElementById("formTitle").textContent=data.applicationTitle;
document.getElementById("formDescription").textContent=data.description;

const form=document.getElementById("applicationForm");

data.fields.forEach(field=>{

const group=document.createElement("div");
group.className="form-group";

const label=document.createElement("label");
label.textContent=field.label;
label.htmlFor=field.id;

if(field.required){
label.classList.add("required");
}

group.appendChild(label);

let input;

if(field.type==="textarea"){

input=document.createElement("textarea");

}else if(field.type==="select"){

input=document.createElement("select");

const defaultOption=document.createElement("option");
defaultOption.textContent="Select an option";
defaultOption.value="";
input.appendChild(defaultOption);

field.options.forEach(opt=>{
const option=document.createElement("option");
option.textContent=opt;
option.value=opt;
input.appendChild(option);
});

}else{

input=document.createElement("input");
input.type=field.type;

}

input.id=field.id;
input.name=field.id;
input.required=field.required;
input.placeholder=field.placeholder || "";

group.appendChild(input);

form.appendChild(group);

});

const submit=document.createElement("button");
submit.className="submit-button";
submit.textContent=data.submitButton.text;
submit.type="submit";

form.appendChild(submit);

form.addEventListener("submit",e=>{
e.preventDefault();

const formData=new FormData(form);
const values=Object.fromEntries(formData);

console.log(values);

const msg=document.getElementById("successMessage");
msg.style.display="block";

setTimeout(()=>{
msg.style.display="none";
},3000);

form.reset();

});

}

loadApplicationForm();

</script>

</body>
</html>
