<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
            position: relative;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(167, 51, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            animation: float1 8s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167, 51, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: float2 10s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, -50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(26, 10, 46, 0.85);
            border: 1px solid rgba(167, 51, 255, 0.3);
            border-radius: 15px;
            padding: 50px;
            max-width: 700px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a733ff 0%, #ff5af0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .required {
            color: #ff5af0;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(167, 51, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #a733ff;
            box-shadow: 0 0 15px rgba(167, 51, 255, 0.2);
        }

        select {
            cursor: pointer;
        }

        option {
            background: #1a0a2e;
            color: white;
            padding: 10px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #a733ff;
        }

        .checkbox-wrapper label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        button,
        .back-link {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-button {
            background: linear-gradient(135deg, #a733ff 0%, #ff5af0 100%);
            color: white;
        }

        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(167, 51, 255, 0.4);
        }

        .back-link {
            background: rgba(167, 51, 255, 0.2);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(167, 51, 255, 0.4);
        }

        .back-link:hover {
            background: rgba(167, 51, 255, 0.3);
        }

        .success-message {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #a733ff;
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="formTitle">Application</h1>
        <p class="subtitle" id="formDescription">Fill out the form below</p>
        
        <form id="applicationForm"></form>

        <div class="button-group">
            <button type="submit" form="applicationForm" class="submit-button">Submit Application</button>
            <a href="blacksitehomepage.html" class="back-link">Back to Home</a>
        </div>
    </div>

    <div class="success-message" id="successMessage">Application submitted successfully!</div>

    <script>
document.addEventListener('DOMContentLoaded', function() {
  loadForm();
});

function loadForm() {
  fetch('applications.json')
    .then(response => response.json())
    .then(data => {
      const titleEl = document.getElementById('formTitle');
      const descEl = document.getElementById('formDescription');
      
      if (titleEl) titleEl.textContent = data.applicationTitle;
      if (descEl) descEl.textContent = data.description;

      const form = document.getElementById('applicationForm');
      if (!form) {
        console.error('Form element not found');
        return;
      }
      
      form.innerHTML = '';

      data.fields.forEach(field => {
        const group = document.createElement('div');
        group.className = 'form-group';

        if (field.type === 'checkbox') {
          group.innerHTML = `
            <div class="checkbox-wrapper">
              <input type="checkbox" id="${field.id}" name="${field.id}" ${field.required ? 'required' : ''}>
              <label for="${field.id}">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
            </div>
          `;
        } else if (field.type === 'textarea') {
          group.innerHTML = `
            <label for="${field.id}">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
            <textarea id="${field.id}" name="${field.id}" placeholder="${field.placeholder}" ${field.required ? 'required' : ''}></textarea>
          `;
        } else if (field.type === 'select') {
          let options = '<option value="">Select an option</option>';
          field.options.forEach(option => {
            options += `<option value="${option}">${option}</option>`;
          });
          group.innerHTML = `
            <label for="${field.id}">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
            <select id="${field.id}" name="${field.id}" ${field.required ? 'required' : ''}>
              ${options}
            </select>
          `;
        } else {
          group.innerHTML = `
            <label for="${field.id}">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
            <input type="${field.type}" id="${field.id}" name="${field.id}" placeholder="${field.placeholder}" ${field.required ? 'required' : ''}>
          `;
        }

        form.appendChild(group);
      });

      form.addEventListener('submit', handleSubmit);
    })
    .catch(error => {
      console.error('Error:', error);
      const descEl = document.getElementById('formDescription');
      if (descEl) descEl.textContent = 'Error loading form. Check console.';
    });
}

function handleSubmit(e) {
  e.preventDefault();
  
  const formData = new FormData(document.getElementById('applicationForm'));
  const data = Object.fromEntries(formData);
  
  const fields = [];
  for (const [key, value] of Object.entries(data)) {
    fields.push({
      name: key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ' '),
      value: value || 'Not provided',
      inline: false
    });
  }

  const discordMessage = {
    content: 'New Application Submitted!',
    embeds: [{
      title: 'New Application',
      color: 14826816,
      fields: fields,
      timestamp: new Date().toISOString()
    }]
  };

  fetch('XDNOWEBHOOKFORU', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(discordMessage)
  })
  .then(response => {
    if (response.ok) {
      const msg = document.getElementById('successMessage');
      if (msg) {
        msg.style.display = 'block';
        setTimeout(() => {
          msg.style.display = 'none';
        }, 3000);
      }
      document.getElementById('applicationForm').reset();
    }
  })
  .catch(error => console.error('Error sending to Discord:', error));
}
    </script>
</body>
</html>
