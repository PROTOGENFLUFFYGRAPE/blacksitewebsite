<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #ab12d1 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(226, 6, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            animation: float1 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(190, 11, 235, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: float2 10s ease-in-out infinite;
        }
       @keyframes float1{
        0%, 100% { transform: translate(0,0);}
        50% { transform:translate(50px, 50px); }
       }
       @keyframes float2 {
        0%, 100%{transform: translate(0, 0);}
        50%{transform: translate(-50px, 50px);}
       }
       

        body {
            background-image: 
                linear-gradient(rgba(167, 51, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(167, 51, 255, 0.03) 1px, transparent 1px),
                linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);
            background-size: 50px 50px, 50px 50px, 100% 100%;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }

        .welcome-text {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a733ff 0%, #ff5af0 50%, #a733ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -2px;
            animation: slideInText 1s ease-out, gradientShift 6s ease-in-out infinite;
            line-height: 1;
        }

        @keyframes slideInText {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="glow-container">
            <h1 class="welcome-text">Welcome</h1>
        </div>
        <div class="accent-line"></div>
        <p class="subtitle">Get Started</p>
    </div>
</body>
</html>
