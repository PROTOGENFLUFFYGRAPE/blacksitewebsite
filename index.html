<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(167, 51, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            animation: float1 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167, 51, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, -50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 50px); }
        }

        body {
            background-image: 
                linear-gradient(rgba(167, 51, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(167, 51, 255, 0.03) 1px, transparent 1px),
                linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);
            background-size: 50px 50px, 50px 50px, 100% 100%;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }

        .welcome-text {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a733ff 0%, #ff5af0 50%, #a733ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -2px;
            animation: slideInText 1s ease-out, gradientShift 6s ease-in-out infinite;
            line-height: 1;
        }

        @keyframes slideInText {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .accent-line {
            width: 150px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #a733ff, transparent);
            margin: 30px auto;
            animation: expandLine 0.8s ease-out 0.3s both;
            border-radius: 2px;
        }

        @keyframes expandLine {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 150px;
                opacity: 1;
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            font-family: 'Space Mono', monospace;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow-container {
            position: relative;
            display: inline-block;
        }

        .glow-container::before {
            content: '';
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle, rgba(167, 51, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
            z-index: -1;
        }

        @media (max-width: 768px) {
            .welcome-text {
                font-size: 4rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .accent-line {
                width: 100px;
            }
        }

        @media (max-width: 480px) {
            .welcome-text {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }

            .accent-line {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow-container">
            <h1 class="welcome-text">Welcome</h1>
        </div>
        <div class="accent-line"></div>
        <p class="subtitle">Get Started</p>
    </div>
</body>
</html>
