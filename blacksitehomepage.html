<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foundation Blacksite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-1:#0a0a14;
  --bg-2:#0f0f1a;
  --sidebar:#0d0d17;
  --sidebar-2:#12121f;
  --border:rgba(210,93,255,0.2);
  --border-strong:rgba(210,93,255,0.35);
  --text:#ffffff;
  --muted:#a89abc;
  --muted-2:#7a6f8f;
  --accent:#e855ff;
  --accent-soft:rgba(232,85,255,0.15);
  --accent-glow:rgba(232,85,255,0.4);
  --success:#00ff88;
}
body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    linear-gradient(rgba(232,85,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,85,255,0.04) 1px, transparent 1px),
    radial-gradient(circle at 20% 50%, rgba(100,20,150,0.25), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(50,20,100,0.2), transparent 50%),
    linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
  background-size:50px 50px,50px 50px,100% 100%,100% 100%,100% 100%;
}
.dashboard{display:flex;min-height:100vh}
.sidebar{
  width:260px;
  background:linear-gradient(180deg,var(--sidebar) 0%,var(--sidebar-2) 100%);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding-bottom:20px;
}
.logo-wrap{
  height:130px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.logo{
  text-align:center;
  line-height:1.2;
}
.logo-title{
  color:var(--accent);
  font-size:20px;
  font-weight:800;
  letter-spacing:.02em;
  margin-bottom:4px;
}
.logo-subtitle{
  font-size:12px;
  color:var(--muted-2);
  font-weight:500;
}
.sidebar-label{
  padding:32px 24px 14px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted-2);
}
.nav{padding:0 12px;flex:1}
.nav-item{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  text-decoration:none;
  color:var(--muted);
  padding:14px 16px;
  margin-bottom:8px;
  border-radius:14px;
  border:1px solid transparent;
  transition:.2s ease;
  cursor:pointer;
}
.nav-item:hover{
  background:rgba(232,85,255,0.08);
  color:var(--text);
  border-color:var(--border);
}
.nav-item.active{
  color:var(--accent);
  border-color:var(--border-strong);
  background:linear-gradient(135deg, rgba(232,85,255,0.12) 0%, rgba(232,85,255,0.08) 100%);
  box-shadow:0 0 20px rgba(232,85,255,0.1);
}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-icon{
  width:20px;
  font-size:16px;
  text-align:center;
}
.nav-text{
  font-size:14px;
  font-weight:500;
}
.nav-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
}
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:16px 20px 12px 20px;
}
.topbar{
  min-height:68px;
  border:1px solid rgba(232,85,255,0.1);
  border-radius:16px;
  background:linear-gradient(135deg, rgba(20,10,40,0.6) 0%, rgba(15,10,35,0.5) 100%);
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
}
.menu-btn{
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:24px;
  line-height:1;
  cursor:pointer;
  transition:.2s ease;
}
.menu-btn:hover{color:var(--accent)}
.divider{
  width:1px;
  height:32px;
  background:rgba(232,85,255,0.1);
}
.topbar-spacer{flex:1}
.login-btn{
  padding:12px 24px;
  border-radius:12px;
  border:1px solid var(--border);
  background:linear-gradient(135deg, rgba(232,85,255,0.15) 0%, rgba(232,85,255,0.08) 100%);
  color:var(--accent);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}
.login-btn:hover{
  background:linear-gradient(135deg, rgba(232,85,255,0.25) 0%, rgba(232,85,255,0.15) 100%);
  border-color:var(--border-strong);
}
.content{
  flex:1;
  padding:28px 12px 0 12px;
}
.error-title{
  font-size:32px;
  font-weight:800;
  margin-bottom:12px;
  background:linear-gradient(135deg, var(--accent) 0%, #ff88ff 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.error-subtitle{
  font-size:16px;
  font-weight:500;
  color:var(--muted);
}
.footer{
  border-top:1px solid rgba(232,85,255,0.1);
  padding:24px 0 12px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  font-size:13px;
}
.footer-left-main{
  color:var(--muted);
}
.footer-left-main strong{color:var(--accent)}
.footer-left-sub{
  margin-top:6px;
  font-size:12px;
  color:var(--muted-2);
}
.footer-right{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  color:var(--muted);
}
.footer-right a{
  color:inherit;
  text-decoration:none;
  transition:.2s ease;
}
.footer-right a:hover{color:var(--accent)}
.footer-divider{
  width:1px;
  height:18px;
  background:rgba(232,85,255,0.1);
}
.status{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--success);
  box-shadow:0 0 10px rgba(0,255,136,0.6);
}
@media (max-width: 900px){
  .dashboard{flex-direction:column}
  .sidebar{width:100%;padding-bottom:0}
  .main{padding:14px}
  .footer{padding-bottom:16px}
}
</style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="logo-wrap">
      <div class="logo">
        <div class="logo-title">Foundation</div>
        <div class="logo-subtitle">Blacksite Access Portal</div>
      </div>
    </div>

    <div class="sidebar-label">Navigation</div>

    <nav class="nav">
      <a class="nav-item active" href="#">
        <span class="nav-left">
          <span class="nav-icon">⌂</span>
          <span class="nav-text">Dashboard</span>
        </span>
        <span class="nav-dot"></span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Staff List</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Server Status</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">⭐</span>
          <span class="nav-text">Leaderboard</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">📋</span>
          <span class="nav-text">Rules</span>
        </span>
      </a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn">☰</button>
      <div class="divider"></div>
      <div class="topbar-spacer"></div>
      <div class="divider"></div>
      <button class="login-btn">Apply Now</button>
    </header>

    <section class="content">
      <div class="error-title">Welcome Back</div>
      <div class="error-subtitle">Foundation Blacksite Access Portal</div>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <div class="footer-left-main">© 2026 <strong>Foundation Blacksite</strong></div>
        <div class="footer-left-sub">Secure Access Portal - Not affiliated with SCP:SL</div>
      </div>

      <div class="footer-right">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
        <span class="footer-divider"></span>
        <span class="status">
          <span class="status-dot"></span>
          All Systems Online
        </span>
      </div>
    </footer>
  </main>
</div>
</body>
</html>
