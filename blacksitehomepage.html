<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foundation Blacksite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-1:#120222;
  --bg-2:#19032b;
  --sidebar:#11031d;
  --sidebar-2:#130420;
  --border:rgba(210,93,255,0.14);
  --border-strong:rgba(210,93,255,0.28);
  --text:#f7f1ff;
  --muted:#9e91b8;
  --muted-2:#6f628d;
  --accent:#d25dff;
  --accent-soft:rgba(210,93,255,0.12);
  --accent-glow:rgba(210,93,255,0.3);
  --success:#18d26b;
}
body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    linear-gradient(rgba(210,93,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(210,93,255,0.03) 1px, transparent 1px),
    radial-gradient(circle at center, rgba(75,18,110,0.28), transparent 52%),
    linear-gradient(90deg,var(--bg-1) 0%,var(--bg-2) 50%,var(--bg-1) 100%);
  background-size:48px 48px,48px 48px,100% 100%,100% 100%;
}
.dashboard{display:flex;min-height:100vh}
.sidebar{
  width:245px;
  background:linear-gradient(180deg,var(--sidebar) 0%,var(--sidebar-2) 100%);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.logo-wrap{
  height:122px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.logo{
  text-align:center;
  line-height:1.15;
}
.logo-mark{
  display:none;
}
.logo-title{
  color:var(--accent);
  font-size:18px;
  font-weight:800;
  letter-spacing:.01em;
}
.logo-subtitle{
  display:none;
}
.sidebar-label{
  padding:44px 24px 14px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted-2);
}
.nav{padding:0 12px}
.nav-item{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  text-decoration:none;
  color:var(--muted);
  padding:14px 16px;
  margin-bottom:6px;
  border-radius:15px;
  border:1px solid transparent;
  transition:.2s ease;
}
.nav-item:hover{
  background:rgba(255,255,255,0.03);
  color:#fff;
}
.nav-item.active{
  color:var(--accent);
  border-color:var(--border-strong);
  background:linear-gradient(180deg, rgba(210,93,255,0.1) 0%, rgba(210,93,255,0.07) 100%);
  box-shadow:0 0 22px rgba(210,93,255,0.08);
}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-icon{
  width:18px;
  font-size:15px;
  text-align:center;
  opacity:.95;
}
.nav-text{
  font-size:15px;
  font-weight:500;
}
.nav-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:18px 22px 12px 22px;
}
.topbar{
  min-height:62px;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:22px;
  background:rgba(11,13,21,0.55);
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 18px 0 24px;
  box-shadow:inset 0 0 0 1px rgba(210,93,255,0.02);
}
.menu-btn{
  background:transparent;
  border:none;
  color:#a89abc;
  font-size:28px;
  line-height:1;
  cursor:pointer;
}
.divider{
  width:1px;
  height:28px;
  background:rgba(255,255,255,0.08);
}
.topbar-spacer{flex:1}
.login-btn{
  padding:10px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}
.login-btn:hover{background:rgba(255,255,255,0.08)}
.content{
  flex:1;
  padding:22px 8px 0 8px;
}
.error-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:6px;
  color:#fff;
}
.error-subtitle{
  font-size:18px;
  font-weight:600;
  color:#fff;
}
.footer{
  border-top:1px solid rgba(255,255,255,0.06);
  padding:22px 0 10px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}
.footer-left-main{
  font-size:15px;
  color:#8e82a5;
}
.footer-left-main strong{color:#fff}
.footer-left-sub{
  margin-top:8px;
  font-size:12px;
  color:#635777;
}
.footer-right{
  display:flex;
  align-items:center;
  gap:22px;
  flex-wrap:wrap;
  font-size:14px;
  color:#9a8eb1;
}
.footer-right a{
  color:inherit;
  text-decoration:none;
}
.footer-right a:hover{color:#fff}
.footer-divider{
  width:1px;
  height:20px;
  background:rgba(255,255,255,0.08);
}
.status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:#b8abc9;
}
.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--success);
  box-shadow:0 0 10px rgba(24,210,107,0.55);
}
@media (max-width: 900px){
  .dashboard{flex-direction:column}
  .sidebar{width:100%}
  .main{padding:16px}
  .footer{padding-bottom:20px}
}
</style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="logo-wrap">
      <div class="logo">
        <div class="logo-mark">FB</div>
        <div class="logo-title">Foundation Blacksite</div>
        <div class="logo-subtitle">The Foundation</div>
      </div>
    </div>

    <div class="sidebar-label">The Foundation</div>

    <nav class="nav">
      <a class="nav-item active" href="#">
        <span class="nav-left">
          <span class="nav-icon">⌂</span>
          <span class="nav-text">Dashboard</span>
        </span>
        <span class="nav-dot"></span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">🛡</span>
          <span class="nav-text">Staff List</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">▦</span>
          <span class="nav-text">Server Status</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">$</span>
          <span class="nav-text">Patrons</span>
        </span>
      </a>

      <a class="nav-item" href="#">
        <span class="nav-left">
          <span class="nav-icon">▮</span>
          <span class="nav-text">Leaderboard</span>
        </span>
      </a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn">☰</button>
      <div class="divider"></div>
      <div class="topbar-spacer"></div>
      <div class="divider"></div>
      <button class="login-btn">Login</button>
    </header>

    <section class="content">
      <div class="error-title">Something went wrong!</div>
      <div class="error-subtitle">Try again</div>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <div class="footer-left-main">© 2026 <strong>Foundation Blacksite.</strong></div>
        <div class="footer-left-sub">All rights reserved. Not affiliated with SCP:SL.</div>
      </div>

      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Support</a>
        <span class="footer-divider"></span>
        <span class="status">
          <span class="status-dot"></span>
          System Normal
        </span>
      </div>
    </footer>
  </main>
</div>
</body>
</html>
